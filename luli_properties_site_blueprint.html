
<style>
  .wrap { padding: 16px 0; }
  .page-tabs { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
  .tab {
    padding: 7px 14px; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: 500;
    border: 1px solid var(--color-border-tertiary); color: var(--color-text-secondary);
    background: transparent; transition: all .15s;
  }
  .tab.active { background: var(--color-background-info); color: var(--color-text-info); border-color: var(--color-border-info); }
  .page-meta { margin-bottom: 16px; }
  .page-title { font-size: 16px; font-weight: 500; color: var(--color-text-primary); }
  .page-desc { font-size: 12px; color: var(--color-text-secondary); margin-top: 3px; line-height: 1.5; }
  .sections { display: flex; flex-direction: column; gap: 1px; border: 1px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; }
  .row {
    display: grid; grid-template-columns: 28px 20px 1fr auto;
    gap: 12px; align-items: start; padding: 13px 14px;
    background: var(--color-background-secondary);
    border-bottom: 1px solid var(--color-border-tertiary);
    transition: background .12s;
  }
  .row:last-child { border-bottom: none; }
  .row:hover { background: var(--color-background-primary); }
  .num {
    width: 24px; height: 24px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 500; flex-shrink: 0;
  }
  .c-green  { background: #E1F5EE; color: #085041; }
  .c-gold   { background: #FAEEDA; color: #633806; }
  .c-gray   { background: #F1EFE8; color: #444441; }
  .c-purple { background: #EEEDFE; color: #3C3489; }
  .c-blue   { background: #E6F1FB; color: #0C447C; }
  @media (prefers-color-scheme: dark) {
    .c-green  { background: #085041; color: #9FE1CB; }
    .c-gold   { background: #633806; color: #FAC775; }
    .c-gray   { background: #444441; color: #D3D1C7; }
    .c-purple { background: #26215C; color: #CECBF6; }
    .c-blue   { background: #042C53; color: #85B7EB; }
  }
  .icon { font-size: 13px; margin-top: 5px; opacity: .6; }
  .section-name { font-size: 13px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 3px; }
  .section-note { font-size: 12px; color: var(--color-text-secondary); line-height: 1.55; }
  .badge {
    font-size: 10px; padding: 3px 9px; border-radius: 20px;
    font-weight: 500; white-space: nowrap; flex-shrink: 0; margin-top: 2px;
  }
  .b-anchor  { background: #EEEDFE; color: #3C3489; }
  .b-trust   { background: #E1F5EE; color: #085041; }
  .b-content { background: #E6F1FB; color: #0C447C; }
  .b-cta     { background: #FAEEDA; color: #633806; }
  .b-std     { background: #F1EFE8; color: #444441; }
  .b-dynamic { background: #FAECE7; color: #712B13; }
  @media (prefers-color-scheme: dark) {
    .b-anchor  { background: #26215C; color: #CECBF6; }
    .b-trust   { background: #085041; color: #9FE1CB; }
    .b-content { background: #042C53; color: #85B7EB; }
    .b-cta     { background: #633806; color: #FAC775; }
    .b-std     { background: #444441; color: #D3D1C7; }
    .b-dynamic { background: #712B13; color: #F5C4B3; }
  }
  .note-bar {
    margin-top: 16px; padding: 11px 14px; border-radius: var(--border-radius-md);
    border: 1px solid var(--color-border-tertiary);
    font-size: 12px; color: var(--color-text-secondary); line-height: 1.6;
    background: var(--color-background-secondary);
  }
  .note-bar strong { color: var(--color-text-primary); font-weight: 500; }
</style>

<div class="wrap">
  <div class="page-tabs" id="tabs"></div>
  <div class="page-meta">
    <div class="page-title" id="ptitle"></div>
    <div class="page-desc" id="pdesc"></div>
  </div>
  <div class="sections" id="slist"></div>
  <div class="note-bar" id="pnote"></div>
</div>

      { n:6, col:"c-blue",   icon:"▦", name:"Investment portfolio preview", badge:"b-content", bl:"Core content", note:"3 property cards — photo, property name, short description (sq ft, bedrooms, location), 'Learn More' CTA. Stagger-in animation on scroll. Hover: subtle lift and gold border glow. Button below: 'View Full Portfolio' linking to Investment Portfolio page. All placeholder for now." },

    desc: "Goal: showcase all properties in a clean, browsable grid. Each card leads to a dedicated property detail page.",
    note: "<strong>Build note:</strong> This page needs a dynamic template — one page layout that gets reused for every property. Build the template now with placeholder content, drop in real properties when Mr. Yuri provides them.",
    sections: [
      { n:1, col:"c-gray",   icon:"▬", name:"Navbar", badge:"b-std", bl:"Always present", note:"Same sticky navbar." },
      { n:2, col:"c-purple", icon:"◈", name:"Page hero", badge:"b-anchor", bl:"Anchor", note:"Short minimal hero. Headline: 'Investment Portfolio.' One line intro. Clean, no parallax needed here — the grid is the star." },
      { n:3, col:"c-blue",   icon:"▦", name:"Property grid", badge:"b-content", bl:"Core content", note:"Full property grid — 3 columns on desktop, 1 on mobile. Each card: large property photo, property name in bold, location tag, short description (sq ft, bedrooms, type), 'Learn More' gold CTA button. Scroll-triggered stagger animation. Placeholder cards for now — 3 to 6 cards minimum to show the layout." },

  {

    note: "<strong>Important:</strong> Build this as a single reusable template with dynamic data. Every property in the portfolio links here. When Mr. Yuri adds new properties, no new pages need to be built — just new data entries.",

      { n:1, col:"c-gray",   icon:"▬", name:"Navbar", badge:"b-std", bl:"Always present", note:"Same sticky navbar." },
      { n:2, col:"c-purple", icon:"◈", name:"Property hero / image gallery", badge:"b-anchor", bl:"Anchor", note:"Large full-width hero image of the property. Optional: 2–3 image thumbnails below for a mini gallery. Property name in large type overlaid or just below. Location tag in sage green." },

      { n:4, col:"c-green",  icon:"▦", name:"Investment highlights", badge:"b-content", bl:"Supporting content", note:"3–4 bullet points or small cards highlighting why this property is a strong investment — projected yield, location growth, refurbishment status, occupancy rate. Sage green icon accents." },
      { n:5, col:"c-gold",   icon:"→", name:"Are you interested? CTA", badge:"b-cta", bl:"Conversion", note:"Full-width CTA section. 'Interested in this investment? Find out more.' Large gold button to Contact page. This is the key conversion moment for every property page." },

      { n:1, col:"c-gray",   icon:"▬", name:"Navbar", badge:"b-std", bl:"Always present", note:"Same sticky navbar." },

      { n:1, col:"c-gray",   icon:"▬", name:"Navbar", badge:"b-std", bl:"Always present", note:"Same sticky navbar." },

let active = "home";

function render() {
  const p = pages.find(x => x.id === active);
  document.getElementById("ptitle").textContent = p.title;
  document.getElementById("pdesc").textContent = p.desc;
  document.getElementById("pnote").innerHTML = p.note;
  document.getElementById("tabs").innerHTML = pages.map(pg =>
    `<button class="tab ${pg.id===active?'active':''}" onclick="go('${pg.id}')">${pg.title}</button>`
  ).join("");
  document.getElementById("slist").innerHTML = p.sections.map(s => `
    <div class="row">
      <div class="num ${s.col}">${s.n}</div>
      <div class="icon">${s.icon}</div>
      <div>
        <div class="section-name">${s.name}</div>
        <div class="section-note">${s.note}</div>
      </div>
      <span class="badge ${s.badge}">${s.bl}</span>
    </div>
  `).join("");
}

function go(id) { active = id; render(); }
render();
</script>
